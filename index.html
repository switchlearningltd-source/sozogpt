<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sozo — A Theological Conversation</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --stone: #FAFAF8;
      --stone-bg: #F0EBE3;
      --stone-mid: #EDE8E0;
      --stone-border: #E2DDD6;
      --stone-text: #2C2720;
      --stone-muted: rgba(100,88,72,0.6);
      --stone-dim: rgba(100,88,72,0.4);
      --orange: #C4611A;
      --orange-deep: #A3500F;
      --orange-faint: rgba(196,97,26,0.07);
      --orange-border: rgba(196,97,26,0.3);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--stone-bg);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 16px 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Container ── */
    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      background: var(--stone);
      border: 1px solid var(--stone-border);
      border-radius: 16px;
      overflow: hidden;
      /* Height: fills available space between top padding and disclaimer */
      height: calc(100vh - 80px);
      max-height: 720px;
      min-height: 480px;
    }

    /* ── Header ── */
    .header {
      padding: 22px 24px 0;
      background: var(--stone);
      flex-shrink: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .header-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .header-title {
      font-family: 'Josefin Sans', sans-serif;
      color: var(--stone-text);
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 1;
    }

    .header-sub {
      color: var(--orange);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      padding-bottom: 2px;
    }

    .header-rule {
      height: 2px;
      background: var(--orange);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(100,88,72,0.2); border-radius: 4px; }

    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      font-family: 'DM Sans', sans-serif;
    }

    .bubble.user {
      background: var(--orange);
      border-radius: 13px 13px 3px 13px;
      color: #FFF5EC;
    }

    .bubble.assistant {
      background: var(--stone-mid);
      border-radius: 13px 13px 13px 3px;
      border-left: 2px solid rgba(196,97,26,0.4);
      color: var(--stone-text);
    }

    /* ── Starters ── */
    .starters-section {
      border-top: 1px solid var(--stone-border);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .starters-label {
      font-size: 10px;
      color: var(--orange);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .starter-btn {
      background: transparent;
      border: 1px solid var(--stone-border);
      border-radius: 9px;
      color: var(--stone-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 11px 16px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }

    .starter-btn:hover, .starter-btn:active {
      background: var(--orange-faint);
      border-color: var(--orange-border);
      color: var(--stone-text);
    }

    /* ── Loading ── */
    .loading-row { display: flex; justify-content: flex-start; }

    .loading-bubble {
      background: var(--stone-mid);
      border-radius: 13px 13px 13px 3px;
      border-left: 2px solid rgba(196,97,26,0.4);
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      animation: bounce 1.2s infinite ease-in-out;
      opacity: 0.5;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .limit-msg {
      text-align: center;
      color: var(--stone-dim);
      font-size: 12px;
      padding: 6px 0;
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 14px;
      border-top: 2px solid var(--orange);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--stone);
    }

    textarea {
      flex: 1;
      background: var(--stone-bg);
      border: 1px solid var(--stone-border);
      border-radius: 9px;
      color: var(--stone-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      line-height: 1.55;
      transition: border-color 0.15s;
      overflow: hidden;
      min-height: 44px;
      max-height: 110px;
      /* Prevent iOS zoom on focus */
      font-size: max(14px, 16px);
    }

    textarea::placeholder { color: var(--stone-dim); }
    textarea:focus { outline: none; border-color: var(--orange); }
    textarea:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn {
      background: var(--orange);
      border: none;
      border-radius: 9px;
      color: #FFF5EC;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      height: 44px;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:hover:not(:disabled) { background: var(--orange-deep); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Disclaimer ── */
    .disclaimer {
      margin-top: 14px;
      font-size: 11px;
      color: var(--stone-muted);
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      width: 100%;
      padding: 0 8px;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body {
        padding: 12px 12px 20px;
        justify-content: flex-start;
      }

      .wrapper {
        height: 100%;
      }

      .container {
        height: calc(100vh - 72px);
        height: calc(var(--vh, 1vh) * 100 - 72px);
        max-height: none;
        border-radius: 12px;
      }

      .header {
        padding: 16px 18px 0;
      }

      .header-title {
        font-size: 22px;
      }

      .header-sub {
        font-size: 9px;
        display: none;
      }

      .messages {
        padding: 14px 16px;
      }

      .bubble {
        max-width: 90%;
        font-size: 14px;
        padding: 11px 14px;
      }

      .starter-btn {
        font-size: 13px;
        padding: 11px 14px;
      }

      .input-area {
        padding: 10px 12px 12px;
      }

      .disclaimer {
        font-size: 10.5px;
        margin-top: 10px;
      }
    }

    @media (max-width: 380px) {
      .header-title { font-size: 20px; }
      .bubble { font-size: 13.5px; }
    }
  </style>
</head>

    // Fix mobile viewport height (accounts for browser chrome)
    function setVH() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    setVH();
    window.addEventListener('resize', setVH);

    // Prevent container shrinking when keyboard opens on mobile
    const container = document.querySelector('.container');
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      "Can I do anything to put myself beyond God's grace?"
    ];

    const WELCOME = "Some questions about God feel too dangerous to ask out loud. Questions about hell, judgment, and whether God really does love everyone — no exceptions.\n\nThis is a space for those questions. The ones that feel too big, too dangerous, or too hopeful to ask anywhere else.\n\nWhat would you like to explore?";

    const MAX_USER_MESSAGES = 20;

    let messages = [];
    let loading = false;
    let userCount = 0;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(role, text) {
      const row = document.createElement('div');
      row.className = `bubble-row ${role}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function showLoading() {
      const row = document.createElement('div');
      row.className = 'loading-row';
      row.id = 'loading';
      row.innerHTML = `<div class="loading-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function hideLoading() {
      const el = document.getElementById('loading');
      if (el) el.remove();
    }

    function showStarters() {
      const section = document.createElement('div');
      section.className = 'starters-section';
      section.id = 'starters';
      const label = document.createElement('p');
      label.className = 'starters-label';
      label.textContent = 'Explore a question';
      section.appendChild(label);
      STARTERS.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'starter-btn';
        btn.textContent = text;
        btn.onclick = () => send(text);
        section.appendChild(btn);
      });
      messagesEl.appendChild(section);
      scrollToBottom();
    }

    function removeStarters() {
      const el = document.getElementById('starters');
      if (el) el.remove();
    }

    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled || inputEl.value.trim() === '';
    }

    async function send(textArg) {
      const content = typeof textArg === 'string' ? textArg.trim() : inputEl.value.trim();
      if (!content || loading || userCount >= MAX_USER_MESSAGES) return;

      removeStarters();
      loading = true;
      userCount++;
      setInputEnabled(false);

      messages.push({ role: 'user', content });
      addBubble('user', content);
      inputEl.value = '';
      autoResize();
      showLoading();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        const data = await res.json();
        hideLoading();

        if (!res.ok || data.error) {
          const errMsg = data.error === 'Session limit reached'
            ? 'You have reached the session limit. Please refresh to start again.'
            : 'Something went wrong. Please try again.';
          addBubble('assistant', errMsg);
        } else {
          messages.push({ role: 'assistant', content: data.content });
          addBubble('assistant', data.content);
        }
      } catch {
        hideLoading();
        addBubble('assistant', 'Something went wrong. Please check your connection and try again.');
      } finally {
        loading = false;
        if (userCount >= MAX_USER_MESSAGES) {
          inputEl.placeholder = 'Session limit reached. Refresh to start again.';
          setInputEnabled(false);
          const limit = document.createElement('p');
          limit.className = 'limit-msg';
          limit.textContent = 'Session limit reached. Refresh to start a new conversation.';
          messagesEl.appendChild(limit);
        } else {
          setInputEnabled(true);
          inputEl.focus();
        }
        scrollToBottom();
      }
    }

    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
    }

    inputEl.addEventListener('input', () => {
      autoResize();
      sendBtn.disabled = inputEl.value.trim() === '' || loading || userCount >= MAX_USER_MESSAGES;
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', () => send());

    addBubble('assistant', WELCOME);
    showStarters();
    setInputEnabled(true);
  </script>
</body>
</html>
