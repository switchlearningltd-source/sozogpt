<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hell No! — A Theological Conversation</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A173D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      height: 90vh;
      max-height: 720px;
      display: flex;
      flex-direction: column;
      background: #1A173D;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .header-title {
      color: #00A3B4;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-sub {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      font-weight: 400;
      margin-left: 10px;
      letter-spacing: 0.03em;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .bubble-row {
      display: flex;
    }

    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 84%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: #ffffff;
    }

    .bubble.user {
      background: #00A3B4;
      border-radius: 14px 14px 3px 14px;
    }

    .bubble.assistant {
      background: #211E4A;
      border-radius: 14px 14px 14px 3px;
      border-left: 2px solid #007A87;
    }

    .starters {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 6px;
    }

    .starter-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 9px;
      color: rgba(255,255,255,0.6);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .starter-btn:hover {
      background: rgba(0,163,180,0.12);
      border-color: rgba(0,163,180,0.4);
      color: rgba(255,255,255,0.9);
    }

    .loading-row {
      display: flex;
      justify-content: flex-start;
    }

    .loading-bubble {
      background: #211E4A;
      border-radius: 14px 14px 14px 3px;
      border-left: 2px solid #007A87;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00A3B4;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .limit-msg {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      padding: 6px 0;
    }

    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 9px;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      line-height: 1.55;
      transition: border-color 0.15s;
      overflow: hidden;
      min-height: 42px;
      max-height: 110px;
    }

    textarea::placeholder { color: rgba(255,255,255,0.25); }
    textarea:focus { outline: none; border-color: #00A3B4; }
    textarea:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn {
      background: #00A3B4;
      border: none;
      border-radius: 9px;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      height: 42px;
    }

    .send-btn:hover:not(:disabled) { background: #007A87; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <span class="header-title">Hell No!</span>
      <span class="header-sub">a theological conversation</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="Ask a question..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="send-btn" disabled>Send</button>
    </div>
  </div>

  <script>
    const STARTERS = [
      "What does the Bible actually say about hell?",
      "How can a loving God allow eternal punishment?",
      "What did the early church believe about salvation?",
      "What does 'aionios' really mean in Greek?"
    ];

    const WELCOME = "Welcome. This is a space to think carefully about questions that matter.\n\nAbout God. About judgement. About what it might mean for love to have the final word.\n\nI'm here to think alongside you — not to push you toward a conclusion. What would you like to explore?";

    const MAX_USER_MESSAGES = 20;

    let messages = [];
    let loading = false;
    let userCount = 0;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(role, text) {
      const row = document.createElement('div');
      row.className = `bubble-row ${role}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    function showLoading() {
      const row = document.createElement('div');
      row.className = 'loading-row';
      row.id = 'loading';
      row.innerHTML = `<div class="loading-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function hideLoading() {
      const el = document.getElementById('loading');
      if (el) el.remove();
    }

    function showStarters() {
      const div = document.createElement('div');
      div.className = 'starters';
      div.id = 'starters';
      STARTERS.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'starter-btn';
        btn.textContent = text;
        btn.onclick = () => send(text);
        div.appendChild(btn);
      });
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function removeStarters() {
      const el = document.getElementById('starters');
      if (el) el.remove();
    }

    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled || inputEl.value.trim() === '';
    }

    async function send(textArg) {
      const content = typeof textArg === 'string' ? textArg.trim() : inputEl.value.trim();
      if (!content || loading || userCount >= MAX_USER_MESSAGES) return;

      removeStarters();
      loading = true;
      userCount++;
      setInputEnabled(false);

      messages.push({ role: 'user', content });
      addBubble('user', content);
      inputEl.value = '';
      autoResize();
      showLoading();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        const data = await res.json();
        hideLoading();

        if (!res.ok || data.error) {
          const errMsg = data.error === 'Session limit reached'
            ? 'You have reached the session limit. Please refresh to start again.'
            : 'Something went wrong. Please try again.';
          addBubble('assistant', errMsg);
        } else {
          messages.push({ role: 'assistant', content: data.content });
          addBubble('assistant', data.content);
        }
      } catch {
        hideLoading();
        addBubble('assistant', 'Something went wrong. Please check your connection and try again.');
      } finally {
        loading = false;
        if (userCount >= MAX_USER_MESSAGES) {
          inputEl.placeholder = 'Session limit reached. Refresh to start again.';
          setInputEnabled(false);
          const limit = document.createElement('p');
          limit.className = 'limit-msg';
          limit.textContent = 'Session limit reached. Refresh to start a new conversation.';
          messagesEl.appendChild(limit);
        } else {
          setInputEnabled(true);
          inputEl.focus();
        }
        scrollToBottom();
      }
    }

    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
    }

    inputEl.addEventListener('input', () => {
      autoResize();
      sendBtn.disabled = inputEl.value.trim() === '' || loading || userCount >= MAX_USER_MESSAGES;
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', () => send());

    // Initialise
    addBubble('assistant', WELCOME);
    showStarters();
    setInputEnabled(true);
  </script>
</body>
</html>
